name: notebook consistency

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Rebuild notebook from cells
        run: python build_notebook.py
      - name: Verify ptd_scraper.ipynb is up to date
        run: |
          if ! git diff --quiet ptd_scraper.ipynb; then
            echo "::error::ptd_scraper.ipynb não reflete notebook_cells/. Rode: python build_notebook.py && git add ptd_scraper.ipynb"
            git diff --stat ptd_scraper.ipynb
            exit 1
          fi
